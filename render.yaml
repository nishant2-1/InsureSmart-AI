services:
  - type: web
    name: insuresmart-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: insuresmart-db
          property: connectionString
    healthCheckPath: /api/hello

databases:
  - name: insuresmart-db
    databaseName: insuresmart
    user: insuresmart
